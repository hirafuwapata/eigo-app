// ---------- word rendering ----------
function TaggedWord({ tok, tag, checked, isCorrect, pending, mute, onTap, onHoldStart, onHoldEnd }) {
  const pen = tag ? penByKey[tag] : null;
  const clean = tok.t.replace(/[.,]$/, "");
  const punct = tok.t.slice(clean.length);

  let wrapPre = "",
    wrapPost = "";
  let style = {};

  if (mute) {
    style.color = "#9CA3AF";
  } else if (pen) {
    style.color = pen.color;
    switch (pen.shape) {
      case "box":
        style.border = `2.5px solid ${pen.color}`;
        break;
      case "underline":
        style.borderBottom = `3px solid ${pen.color}`;
        break;
      case "bracket":
        wrapPre = "[";
        wrapPost = "]";
        break;
      case "paren-muted":
        wrapPre = "(";
        wrapPost = ")";
        style.opacity = 0.7;
        style.fontWeight = 400;
        break;
      case "triangle":
        wrapPre = "▲";
        break;
      case "dotted":
        style.textDecoration = "underline dotted";
        style.textDecorationColor = pen.color;
        style.textDecorationThickness = "2px";
        break;
    }
  }

  let ring = "";
  if (checked) ring = isCorrect ? "outline outline-2 outline-emerald-500" : "outline outline-2 outline-rose-500";
  if (pending) ring = "outline outline-2 outline-dashed outline-amber-400";

  return (
    <span
      onMouseDown={onHoldStart}
      onMouseUp={onHoldEnd}
      onMouseLeave={onHoldEnd}
      onTouchStart={onHoldStart}
      onTouchEnd={onHoldEnd}
      onTouchMove={onHoldEnd}
      onContextMenu={(e) => e.preventDefault()}
      onClick={onTap}
      className={`relative inline-flex items-baseline gap-0.5 px-1.5 py-1 mx-0.5 my-1 rounded-sm cursor-pointer select-none transition-colors font-mono text-[17px] leading-tight ${ring}`}
      style={{ ...style, backgroundColor: pen && !mute ? `${pen.color}14` : "transparent", WebkitTouchCallout: "none", WebkitUserSelect: "none", userSelect: "none" }}
    >
      {wrapPre && <span className="opacity-70 font-bold">{wrapPre}</span>}
      {clean}
      {wrapPost && <span className="opacity-70 font-bold">{wrapPost}</span>}
      {punct}
    </span>
  );
}

function GroupBox({ group, children, onRemove, faded, verdict }) {
  const info = groupTypeByKey[group.type];
  const label = (
    <span
      className="absolute -top-3 left-1.5 text-[10px] font-bold px-1.5 py-0.5 rounded-full text-white flex items-center gap-1 whitespace-nowrap z-10"
      style={{ backgroundColor: info.color }}
    >
      {info.mark}
      {verdict === "correct" && <Ico size={10}>✓</Ico>}
      {verdict === "wrong" && <Ico size={10}>✕</Ico>}
      {onRemove && (
        <button onClick={onRemove} className="leading-none">
          <Ico size={10}>✕</Ico>
        </button>
      )}
    </span>
  );
  const verdictRing = verdict === "correct" ? "outline outline-2 outline-emerald-500" : verdict === "wrong" ? "outline outline-2 outline-rose-500" : "";
  const wrap = `relative inline-flex items-end mx-1.5 my-3 px-1 ${verdictRing}` + (faded ? " opacity-60" : "");
  const content = <span className="flex flex-wrap items-baseline">{children}</span>;

  if (info.shape === "paren") {
    return (
      <span className={wrap}>
        {label}
        <span className="font-mono text-2xl font-bold" style={{ color: PHRASE_NEUTRAL }}>(</span>
        {content}
        <span className="font-mono text-2xl font-bold" style={{ color: PHRASE_NEUTRAL }}>)</span>
      </span>
    );
  }
  if (info.shape === "bracket") {
    return (
      <span className={wrap + " pb-1 border-b-2 border-dashed"} style={{ borderColor: PHRASE_NEUTRAL }}>
        {label}
        <span className="font-mono text-2xl font-bold" style={{ color: PHRASE_NEUTRAL }}>[</span>
        {content}
        <span className="font-mono text-2xl font-bold" style={{ color: PHRASE_NEUTRAL }}>]</span>
      </span>
    );
  }
  if (info.shape === "underline") {
    return (
      <span className={wrap + " pb-1 border-b-[3px]"} style={{ borderColor: PHRASE_NEUTRAL }}>
        {label}
        {content}
      </span>
    );
  }
  if (info.shape === "dotted") {
    return (
      <span className={wrap + " pb-1 border-b-2"} style={{ borderColor: PHRASE_NEUTRAL, borderBottomStyle: "dotted" }}>
        {label}
        {content}
      </span>
    );
  }
  if (info.shape === "solidbox") {
    return (
      <span className={wrap + " rounded-lg border-[3px] pt-3"} style={{ borderColor: info.color, backgroundColor: `${info.color}0D` }}>
        {label}
        {content}
      </span>
    );
  }
  // box (NP・従属節)
  return (
    <span className={wrap + " rounded-lg border-2 border-dashed pt-3"} style={{ borderColor: info.shape === "box" && info.key === "sub" ? info.color : info.color, backgroundColor: `${info.color}0D` }}>
      {label}
      {content}
    </span>
  );
}

function PosTaggingGame({ onBack }) {
  const [level, setLevel] = useState("simple");
  const [idx, setIdx] = useState(0);
  const [tags, setTags] = useState({});
  const [pen, setPen] = useState("noun");
  const [checked, setChecked] = useState(false);
  const [wordAttempts, setWordAttempts] = useState(0);
  const [wordRevealed, setWordRevealed] = useState(false);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [stars, setStars] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [dict, setDict] = useState(null);
  const holdTimer = useRef(null);

  const [mode, setMode] = useState("word"); // "word" | "phrase" | "clause" | "pattern"
  const [phrases, setPhrases] = useState([]);
  const [clauses, setClauses] = useState([]);
  const [selStart, setSelStart] = useState(null);
  const [selEnd, setSelEnd] = useState(null);
  const [phraseMsg, setPhraseMsg] = useState("");
  const [showModel, setShowModel] = useState(false);
  const [phraseChecked, setPhraseChecked] = useState(false);
  const [clauseChecked, setClauseChecked] = useState(false);

  const [selectedPattern, setSelectedPattern] = useState(null);
  const [patternChecked, setPatternChecked] = useState(false);
  const [clausePatterns, setClausePatterns] = useState({});
  const [clausePatternChecked, setClausePatternChecked] = useState(false);

  const [levelUpMsg, setLevelUpMsg] = useState("");
  const [studentName, setStudentName] = useState("");
  const [finished, setFinished] = useState(false);

  const pool = level === "simple" ? SIMPLE_SENTENCES : ADVANCED_SENTENCES;
  const sentence = pool[idx];
  const isSimple = sentence.level === "simple";

  const resetSentence = useCallback(() => {
    setTags({});
    setChecked(false);
    setWordAttempts(0);
    setWordRevealed(false);
    setMode("word");
    setPhrases([]);
    setClauses([]);
    setSelStart(null);
    setSelEnd(null);
    setPhraseMsg("");
    setShowModel(false);
    setPhraseChecked(false);
    setClauseChecked(false);
    setSelectedPattern(null);
    setPatternChecked(false);
    setClausePatterns({});
    setClausePatternChecked(false);
  }, []);

  useEffect(() => {
    resetSentence();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [idx, level]);

  function goToMode(m) {
    setShowModel(false);
    setSelStart(null);
    setSelEnd(null);
    setPhraseMsg("");
    setMode(m);
  }

  function tapWord(i) {
    if (mode === "phrase" || mode === "clause") return tapWordForSpan(i);
    if (checked && wordAllCorrect) return;
    setTags((prev) => {
      const next = { ...prev };
      if (next[i] === pen) delete next[i];
      else next[i] = pen;
      return next;
    });
  }

  function tapWordForSpan(i) {
    const list = mode === "phrase" ? phrases : clauses;
    const done = mode === "phrase" ? phraseChecked : clauseChecked;
    if (done) return;
    if (list.some((p) => i >= p.start && i <= p.end)) return;
    if (selStart === null) {
      setSelStart(i);
      setSelEnd(i);
    } else {
      setSelStart(Math.min(selStart, i));
      setSelEnd(Math.max(selEnd, i));
    }
    setPhraseMsg("");
  }

  function clearSelection() {
    setSelStart(null);
    setSelEnd(null);
    setPhraseMsg("");
  }

  function addSpan(type) {
    if (selStart === null || selEnd === null) return;
    let s = selStart,
      e = selEnd;
    const list = mode === "phrase" ? phrases : clauses;
    if (mode === "phrase" && type === "NP") {
      while (s > 0 && sentence.tokens[s - 1].pos === "article" && !list.some((p) => s - 1 >= p.start && s - 1 <= p.end)) {
        s -= 1;
      }
    }
    const overlap = list.some((p) => !(e < p.start || s > p.end));
    if (overlap) {
      setPhraseMsg("すでに他の区切りと重なっています");
      return;
    }
    if (mode === "phrase") setPhrases((prev) => [...prev, { start: s, end: e, type }]);
    else setClauses((prev) => [...prev, { start: s, end: e, type }]);
    setSelStart(null);
    setSelEnd(null);
    setPhraseMsg("");
  }

  function removeSpan(i) {
    if (mode === "phrase") setPhrases((prev) => prev.filter((_, idx2) => idx2 !== i));
    else setClauses((prev) => prev.filter((_, idx2) => idx2 !== i));
  }

  function startHold(tok) {
    holdTimer.current = setTimeout(() => lookup(tok.t), 480);
  }
  function endHold() {
    clearTimeout(holdTimer.current);
  }

  async function lookup(word) {
    const clean = word.replace(/[.,]$/, "").toLowerCase();
    const local = LOCAL_DICTIONARY[clean];
    if (local) {
      setDict({ word: clean, loading: false, defs: [{ pos: "", def: local }], error: false });
      return;
    }
    setDict({ word: clean, loading: true, defs: null, error: false });
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${clean}`);
      if (!res.ok) throw new Error("not found");
      const data = await res.json();
      const meanings = data[0]?.meanings?.slice(0, 2).map((m) => ({ pos: m.partOfSpeech, def: m.definitions[0]?.definition }));
      setDict({ word: clean, loading: false, defs: meanings, error: false });
    } catch (e) {
      setDict({ word: clean, loading: false, defs: null, error: true });
    }
  }

  function checkAnswers() {
    setWordAttempts((a) => a + 1);
    setChecked(true);
  }

  const wordAllCorrect = sentence.tokens.every((tok, i) => tags[i] === (tok.pos === "other" ? undefined : tok.pos));

  function revealWordAnswers() {
    const correctTags = {};
    sentence.tokens.forEach((tok, i) => {
      if (tok.pos !== "other") correctTags[i] = tok.pos;
    });
    setTags(correctTags);
    setWordRevealed(true);
  }

  function checkPhrases() {
    setSelStart(null);
    setSelEnd(null);
    setPhraseChecked(true);
  }

  function checkClauses() {
    setSelStart(null);
    setSelEnd(null);
    setClauseChecked(true);
  }

  function checkPattern() {
    if (selectedPattern === null) return;
    setPatternChecked(true);
  }

  const sortedClauses = [...clauses].sort((a, b) => a.start - b.start);
  const sortedCorrectClauses = sentence.correctClauses ? [...sentence.correctClauses].sort((a, b) => a.start - b.start) : [];

  function checkClausePatterns() {
    setClausePatternChecked(true);
  }

  function isPhraseSetCorrect(userList, correctList) {
    return userList.length === correctList.length && userList.every((p) => correctList.some((cp) => cp.start === p.start && cp.end === p.end && cp.type === p.type));
  }

  function isSentenceFullySolved() {
    if (wordRevealed) return false;
    if (!wordAllCorrect) return false;
    if (isSimple) {
      return selectedPattern === sentence.pattern;
    }
    if (!isPhraseSetCorrect(phrases, sentence.correctPhrases)) return false;
    if (!isPhraseSetCorrect(clauses, sentence.correctClauses || [])) return false;
    return sortedClauses.length > 0 && sortedClauses.every((c, i) => clausePatterns[i] === sortedCorrectClauses[i]?.pattern);
  }

  function next() {
    const solved = isSentenceFullySolved();
    const perfect = solved && wordAttempts <= 1;
    setScore((s) => ({ correct: s.correct + (solved ? 1 : 0), total: s.total + 1 }));
    setStars((s) => s + (perfect ? 3 : solved ? 2 : 0));
    if (perfect) {
      setStreak((s) => {
        const next = s + 1;
        setBestStreak((b) => Math.max(b, next));
        return next;
      });
    } else {
      setStreak(0);
    }

    if (level === "simple" && idx === SIMPLE_SENTENCES.length - 1) {
      setFinished(true);
      return;
    } else if (level === "simple") {
      setIdx(idx + 1);
    } else {
      setIdx((idx + 1) % ADVANCED_SENTENCES.length);
    }
    resetSentence();
  }

  function continueToAdvanced() {
    setFinished(false);
    setLevel("advanced");
    setIdx(0);
    setScore({ correct: 0, total: 0 });
    setStars(0);
    setStreak(0);
    setBestStreak(0);
    resetSentence();
  }

  function retryStage1() {
    setFinished(false);
    setLevel("simple");
    setIdx(0);
    setScore({ correct: 0, total: 0 });
    setStars(0);
    setStreak(0);
    setBestStreak(0);
    resetSentence();
  }

  const isCorrectFor = (i, tok) => tags[i] === (tok.pos === "other" ? undefined : tok.pos);

  function renderTokenSpan(i, opts = {}) {
    const tok = sentence.tokens[i];
    const pending = (mode === "phrase" || mode === "clause") && selStart !== null && i >= selStart && i <= selEnd;
    return (
      <TaggedWord
        key={`${level}-${idx}-${mode}-w-${i}`}
        tok={tok}
        tag={tags[i]}
        checked={checked}
        isCorrect={isCorrectFor(i, tok)}
        pending={pending}
        mute={opts.mute}
        onTap={() => tapWord(i)}
        onHoldStart={() => startHold(tok)}
        onHoldEnd={endHold}
      />
    );
  }

  function buildSegments(list) {
    const segs = [];
    let i = 0;
    while (i < sentence.tokens.length) {
      const g = list.find((p) => p.start === i);
      if (g) {
        segs.push({ kind: "group", group: g });
        i = g.end + 1;
      } else {
        segs.push({ kind: "word", i });
        i++;
      }
    }
    return segs;
  }

  let groupList = [];
  if (mode === "phrase") groupList = showModel ? sentence.correctPhrases : phrases;
  else if (mode === "clause" || mode === "pattern") groupList = showModel ? sentence.correctClauses || [] : mode === "clause" ? clauses : clauses;
  const segments = buildSegments(groupList);

  function groupVerdict(g) {
    if (showModel) return null;
    if (mode === "phrase" && phraseChecked) {
      const isRight = sentence.correctPhrases.some((cp) => cp.start === g.start && cp.end === g.end && cp.type === g.type);
      return isRight ? "correct" : "wrong";
    }
    if (mode === "clause" && clauseChecked) {
      const isRight = sentence.correctClauses.some((cc) => cc.start === g.start && cc.end === g.end && cc.type === g.type);
      return isRight ? "correct" : "wrong";
    }
    return null;
  }

  if (finished) {
    const pct = score.total ? Math.round((score.correct / score.total) * 100) : 0;
    const cheer = pct >= 90 ? "パーフェクトに近い!素晴らしい!" : pct >= 70 ? "よくできました!" : "お疲れ様!また挑戦してみよう";
    const confettiEmoji = ["🎉", "✨", "🎊", "⭐️", "🎈"];
    return (
      <div className="min-h-screen bg-[#EDF1F5] text-[#1B2A4A] font-sans flex items-center justify-center p-4 overflow-hidden">
        <style>{`
          @keyframes confettiFall {
            0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(420px) rotate(360deg); opacity: 0; }
          }
          @keyframes popScale {
            0% { transform: scale(0.7); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
          }
        `}</style>
        <div className="relative">
          {Array.from({ length: 14 }).map((_, i) => (
            <span
              key={i}
              className="absolute top-0 text-xl pointer-events-none select-none"
              style={{
                left: `${(i * 37) % 100}%`,
                animation: `confettiFall ${2.2 + (i % 5) * 0.4}s ease-in ${(i % 7) * 0.15}s infinite`,
              }}
            >
              {confettiEmoji[i % confettiEmoji.length]}
            </span>
          ))}
          <div
            className="relative bg-white rounded-2xl shadow-lg border border-[#1B2A4A]/10 p-6 max-w-sm w-full text-center"
            style={{ animation: "popScale 0.4s ease-out" }}
          >
            <p className="text-3xl mb-1">🎉 おめでとう! 🎉</p>
            <h2 className="text-xl font-bold mb-1">ステージ1 クリア!</h2>
            <p className="text-xs text-[#1B2A4A]/50 mb-4">単文15問、お疲れ様でした。</p>
            {studentName && <p className="text-sm font-semibold mb-1">{studentName} さん</p>}
            <p className="text-4xl font-mono font-bold mb-1">{score.correct} / {score.total}</p>
            <p className="text-sm text-[#1B2A4A]/60 mb-1">正答率 {pct}%</p>
            <p className="text-sm text-amber-500 font-semibold mb-1">⭐️ {stars} / {SIMPLE_SENTENCES.length * 3} (ノーミス3☆・修正2☆)</p>
            {bestStreak >= 2 && <p className="text-xs text-[#1B2A4A]/50 mb-1">🔥 最高{bestStreak}連続ノーミス</p>}
            <p className="text-sm font-semibold text-violet-600 mb-5">{cheer}</p>
            <p className="text-xs text-[#1B2A4A]/40 mb-5">この画面を先生に見せて出席を確認してもらおう。</p>
            <div className="flex flex-col gap-2">
              <button onClick={retryStage1} className="bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold">
                もう一度挑戦する
              </button>
              <button onClick={continueToAdvanced} className="text-xs text-[#1B2A4A]/50 underline py-1">
                続けて複文・重文にも挑戦する(任意)
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[#EDF1F5] text-[#1B2A4A] font-sans flex flex-col items-center py-6 px-3">
      <style>{`@keyframes popIn { from { transform: scale(0.9); opacity:0 } to { transform: scale(1); opacity:1 } }`}</style>

      <div className="w-full max-w-xl">
        <button onClick={onBack} className="text-[#1B2A4A]/50 text-sm mb-2 flex items-center gap-1">
          ← ホームに戻る
        </button>
        <div className="flex items-baseline justify-between mb-1">
          <h1 className="text-2xl font-bold tracking-tight">構文タグつけゲーム</h1>
          <span className="text-xs tracking-wide text-[#1B2A4A]/50 font-mono">
            {level === "simple" ? "Lv.1 単文" : "Lv.2 複文・重文"} {idx + 1}/{pool.length}
          </span>
        </div>

        <input
          type="text"
          value={studentName}
          onChange={(e) => setStudentName(e.target.value)}
          placeholder="名前(出席確認用)"
          className="w-full text-sm border border-[#1B2A4A]/15 rounded-lg px-3 py-1.5 bg-white mb-3"
        />

        {levelUpMsg && (
          <div className="flex items-start gap-2 bg-violet-50 border border-violet-200 text-violet-700 text-xs rounded-xl px-3 py-2 mb-3">
            <Ico size={14}>✨</Ico>
            <span>{levelUpMsg}</span>
          </div>
        )}

        {/* mode tabs */}
        <div className="flex gap-1.5 mb-3">
          <button
            onClick={() => goToMode("word")}
            className={`flex-1 flex items-center justify-center gap-1.5 rounded-xl py-2 text-sm font-semibold border transition-colors ${mode === "word" ? "bg-[#1B2A4A] text-white border-[#1B2A4A]" : "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/60"}`}
          >
            <Ico size={15}>Aa</Ico> ① 品詞
          </button>
          {isSimple ? (
            <button
              onClick={() => wordAllCorrect && goToMode("pattern")}
              disabled={!wordAllCorrect}
              className={`flex-1 flex items-center justify-center gap-1.5 rounded-xl py-2 text-sm font-semibold border transition-colors disabled:opacity-40 ${mode === "pattern" ? "bg-[#1B2A4A] text-white border-[#1B2A4A]" : "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/60"}`}
            >
              <Ico size={15}>①</Ico> ② 文型
            </button>
          ) : (
            <>
              <button
                onClick={() => wordAllCorrect && goToMode("phrase")}
                disabled={!wordAllCorrect}
                className={`flex-1 flex items-center justify-center gap-1.5 rounded-xl py-2 text-sm font-semibold border transition-colors disabled:opacity-40 ${mode === "phrase" ? "bg-[#1B2A4A] text-white border-[#1B2A4A]" : "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/60"}`}
              >
                <Ico size={15}>▤</Ico> ② 句
              </button>
              <button
                onClick={() => phraseChecked && goToMode("clause")}
                disabled={!phraseChecked}
                className={`flex-1 flex items-center justify-center gap-1.5 rounded-xl py-2 text-sm font-semibold border transition-colors disabled:opacity-40 ${mode === "clause" || mode === "pattern" ? "bg-[#1B2A4A] text-white border-[#1B2A4A]" : "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/60"}`}
              >
                <Ico size={15}>🌿</Ico> ③ 節・文型
              </button>
            </>
          )}
        </div>

        {mode === "word" && (
          <>
            <p className="text-xs text-[#1B2A4A]/60 mb-3">
              {checked && !wordAllCorrect && wordAttempts >= 2
                ? "2回間違えたので「こたえを見る」を押すと正解が表示されます。"
                : checked && !wordAllCorrect
                ? "赤い枠の単語が違います。直してからもう一度「こたえ合わせ」しよう。"
                : "ペンを選んで、単語をタップして印をつけよう。長押しで意味を調べられます。"}
            </p>
            <div className="flex items-center gap-2 mb-3 text-sm">
              <div className="flex items-center gap-2 bg-white rounded-full px-3 py-1 shadow-sm border border-[#1B2A4A]/10">
                <span className="text-[#1B2A4A]/50">score</span>
                <span className="font-mono font-bold">{score.correct} / {score.total}</span>
              </div>
              {streak >= 2 && (
                <div className="flex items-center gap-1 bg-amber-50 border border-amber-300 text-amber-600 rounded-full px-3 py-1 font-mono font-bold">
                  🔥 {streak}
                </div>
              )}
            </div>
          </>
        )}

        {mode === "phrase" && (
          <div className="mb-3">
            <p className="text-xs text-[#1B2A4A]/60 mb-2">
              {phraseChecked ? "緑=正解、赤=不正解です。" : "まとまりに含めたい単語を順にタップ(タップするたびに範囲が広がります)。下の句タイプをタップして囲もう。"}
            </p>
            {!phraseChecked && (
              <>
                <div className="flex flex-wrap gap-1.5 mb-1.5">
                  {PHRASE_TYPES.map((p) => (
                    <button
                      key={p.key}
                      disabled={selStart === null}
                      onClick={() => addSpan(p.key)}
                      className="text-xs font-semibold rounded-full px-3 py-1.5 border-2 disabled:opacity-30 transition-opacity"
                      style={{ borderColor: p.color, color: p.color }}
                    >
                      {p.mark} {p.label}
                    </button>
                  ))}
                  {selStart !== null && (
                    <button onClick={clearSelection} className="text-xs font-semibold rounded-full px-3 py-1.5 border-2 border-[#1B2A4A]/20 text-[#1B2A4A]/50">
                      選び直す
                    </button>
                  )}
                </div>
                {phraseMsg && <p className="text-xs text-rose-500 mb-1">{phraseMsg}</p>}
              </>
            )}
            <button onClick={() => setShowModel((v) => !v)} className="text-xs underline text-[#1B2A4A]/50">
              {showModel ? "自分の答えに戻る" : "見本の区切り方を見る"}
            </button>
          </div>
        )}

        {mode === "clause" && (
          <div className="mb-3">
            <p className="text-xs text-[#1B2A4A]/60 mb-2">
              {clauseChecked ? "緑=正解、赤=不正解です。" : "節(主語+動詞のまとまり)ごとに単語をタップして選び、主節/従属節を選ぼう。"}
            </p>
            {!clauseChecked && (
              <>
                <div className="flex flex-wrap gap-1.5 mb-1.5">
                  {CLAUSE_TYPES.map((c) => (
                    <button
                      key={c.key}
                      disabled={selStart === null}
                      onClick={() => addSpan(c.key)}
                      className="text-xs font-semibold rounded-full px-3 py-1.5 border-2 disabled:opacity-30 transition-opacity"
                      style={{ borderColor: c.color, color: c.color }}
                    >
                      {c.mark} {c.label}
                    </button>
                  ))}
                  {selStart !== null && (
                    <button onClick={clearSelection} className="text-xs font-semibold rounded-full px-3 py-1.5 border-2 border-[#1B2A4A]/20 text-[#1B2A4A]/50">
                      選び直す
                    </button>
                  )}
                </div>
                {phraseMsg && <p className="text-xs text-rose-500 mb-1">{phraseMsg}</p>}
              </>
            )}
            <button onClick={() => setShowModel((v) => !v)} className="text-xs underline text-[#1B2A4A]/50">
              {showModel ? "自分の答えに戻る" : "見本の区切り方を見る"}
            </button>
          </div>
        )}

        {mode === "pattern" && isSimple && (
          <div className="mb-3">
            <p className="text-xs text-[#1B2A4A]/60 mb-2">この文は第何文型?</p>
            <div className="grid grid-cols-1 gap-1.5">
              {PATTERNS.map((p) => {
                const isSel = selectedPattern === p.n;
                const isAnswer = patternChecked && p.n === sentence.pattern;
                let cls = "bg-white border-[#1B2A4A]/15 text-[#1B2A4A]";
                if (isSel && !patternChecked) cls = "bg-[#1B2A4A] border-[#1B2A4A] text-white shadow-md scale-[1.02]";
                if (patternChecked) {
                  if (isSel && isAnswer) cls = "bg-emerald-500 border-emerald-500 text-white";
                  else if (isSel && !isAnswer) cls = "bg-rose-500 border-rose-500 text-white";
                  else if (isAnswer) cls = "bg-emerald-50 border-emerald-500 text-emerald-700";
                  else cls = "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/30";
                }
                return (
                  <button
                    key={p.n}
                    disabled={patternChecked}
                    onClick={() => setSelectedPattern(p.n)}
                    className={`flex items-center justify-between rounded-xl px-4 py-2.5 border-2 text-left transition-all ${cls}`}
                  >
                    <span className="text-sm font-semibold flex items-center gap-1.5">
                      {isSel && <Ico size={16}>✓</Ico>}
                      第{p.n}文型 <span className="font-mono">{p.label}</span>
                    </span>
                    <span className={`text-xs ${isSel || (patternChecked && isAnswer) ? "opacity-80" : "text-[#1B2A4A]/40"}`}>{p.desc}</span>
                  </button>
                );
              })}
            </div>
            {patternChecked && (
              <p className={`text-sm font-semibold mt-2 ${selectedPattern === sentence.pattern ? "text-emerald-600" : "text-rose-500"}`}>
                {selectedPattern === sentence.pattern ? "正解!" : `不正解。正解は第${sentence.pattern}文型でした。`}
              </p>
            )}
          </div>
        )}

        {mode === "pattern" && !isSimple && (
          <div className="mb-3">
            <p className="text-xs text-[#1B2A4A]/60 mb-2">それぞれの節は第何文型?(節1から順に)</p>
            {sortedClauses.map((c, i) => {
              const info = groupTypeByKey[c.type];
              const words = sentence.tokens.slice(c.start, c.end + 1).map((t) => t.t).join(" ");
              return (
                <div key={i} className="mb-3">
                  <p className="text-xs font-mono mb-1" style={{ color: info.color }}>
                    節{i + 1}({info.label}): {words}
                  </p>
                  <div className="flex flex-wrap gap-1.5">
                    {PATTERNS.map((p) => {
                      const isSel = clausePatterns[i] === p.n;
                      const ans = sortedCorrectClauses[i]?.pattern;
                      let cls = "bg-white border-[#1B2A4A]/15 text-[#1B2A4A]/70";
                      if (isSel && !clausePatternChecked) cls = "bg-[#1B2A4A] border-[#1B2A4A] text-white shadow-sm";
                      if (clausePatternChecked) {
                        if (isSel) cls = p.n === ans ? "bg-emerald-500 border-emerald-500 text-white" : "bg-rose-500 border-rose-500 text-white";
                        else if (p.n === ans) cls = "bg-emerald-50 border-emerald-500 text-emerald-700";
                        else cls = "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/30";
                      }
                      return (
                        <button
                          key={p.n}
                          disabled={clausePatternChecked}
                          onClick={() => setClausePatterns((prev) => ({ ...prev, [i]: p.n }))}
                          className={`text-xs font-semibold rounded-full px-2.5 py-1.5 border-2 transition-all ${cls}`}
                        >
                          第{p.n} {p.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {sortedClauses.length === 0 && <p className="text-xs text-[#1B2A4A]/40">先に②で節を作ってください。</p>}
          </div>
        )}

        {/* sentence card */}
        <div
          className="bg-white rounded-2xl shadow-sm border border-[#1B2A4A]/10 p-5 mb-2 relative overflow-hidden"
          style={{ backgroundImage: "repeating-linear-gradient(transparent, transparent 47px, rgba(27,42,74,0.08) 48px)" }}
        >
          <div key={`${level}-${idx}-${mode}`} className="flex flex-wrap items-end leading-loose">
            {segments.map((seg, k) =>
              seg.kind === "word" ? (
                renderTokenSpan(seg.i)
              ) : (
                <GroupBox
                  key={`${level}-${idx}-${mode}-g-${k}`}
                  group={seg.group}
                  faded={showModel}
                  verdict={groupVerdict(seg.group)}
                  onRemove={
                    showModel || (mode === "phrase" && phraseChecked) || (mode === "clause" && clauseChecked) || mode === "pattern"
                      ? null
                      : () => removeSpan((mode === "phrase" ? phrases : clauses).indexOf(seg.group))
                  }
                >
                  {Array.from({ length: seg.group.end - seg.group.start + 1 }, (_, o) => seg.group.start + o).map((i) =>
                    renderTokenSpan(i, { mute: seg.group.type === "AdvP" })
                  )}
                </GroupBox>
              )
            )}
          </div>
        </div>

        {mode === "word" && (
          <div className="grid grid-cols-4 gap-1.5 mb-3">
            {PENS.map((p) => (
              <button
                key={p.key}
                onClick={() => setPen(p.key)}
                className={`flex flex-col items-center gap-1 rounded-xl py-2 border-2 transition-all ${pen === p.key ? "shadow-md scale-[1.03]" : "opacity-70"}`}
                style={{ borderColor: p.color, backgroundColor: pen === p.key ? `${p.color}1A` : "white" }}
              >
                <span className="font-mono text-lg font-bold" style={{ color: p.color }}>{p.mark}</span>
                <span className="text-[10px] font-medium leading-none">{p.label}</span>
              </button>
            ))}
          </div>
        )}

        <div className="flex gap-2">
          {mode === "word" &&
            (!checked ? (
              <button onClick={checkAnswers} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                <Ico size={18}>✓</Ico> こたえ合わせ
              </button>
            ) : wordAllCorrect ? (
              <button onClick={() => goToMode(isSimple ? "pattern" : "phrase")} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                {isSimple ? "文型を選ぶ" : "句をつくる"} <Ico size={18}>›</Ico>
              </button>
            ) : wordAttempts >= 2 ? (
              <button onClick={revealWordAnswers} className="flex-1 bg-amber-500 text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                こたえを見る
              </button>
            ) : (
              <button onClick={() => setChecked(false)} className="flex-1 bg-rose-500 text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                直してもう一度
              </button>
            ))}
          {mode === "phrase" &&
            (!phraseChecked ? (
              <button onClick={checkPhrases} disabled={phrases.length === 0} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform disabled:opacity-40">
                <Ico size={18}>✓</Ico> こたえ合わせ
              </button>
            ) : isSimple ? (
              <button onClick={() => goToMode("pattern")} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                文型を選ぶ <Ico size={18}>›</Ico>
              </button>
            ) : (
              <button onClick={() => goToMode("clause")} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                節をつくる <Ico size={18}>›</Ico>
              </button>
            ))}
          {mode === "clause" &&
            (!clauseChecked ? (
              <button onClick={checkClauses} disabled={clauses.length === 0} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform disabled:opacity-40">
                <Ico size={18}>✓</Ico> こたえ合わせ
              </button>
            ) : (
              <button onClick={() => goToMode("pattern")} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                節の文型を選ぶ <Ico size={18}>›</Ico>
              </button>
            ))}
          {mode === "pattern" && isSimple &&
            (!patternChecked ? (
              <button onClick={checkPattern} disabled={selectedPattern === null} className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform disabled:opacity-40">
                <Ico size={18}>✓</Ico> こたえ合わせ
              </button>
            ) : (
              <button onClick={next} className="flex-1 bg-emerald-600 text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                {level === "simple" && idx === SIMPLE_SENTENCES.length - 1 ? "結果を見る" : "次の文へ"} <Ico size={18}>›</Ico>
              </button>
            ))}
          {mode === "pattern" && !isSimple &&
            (!clausePatternChecked ? (
              <button
                onClick={checkClausePatterns}
                disabled={sortedClauses.length === 0 || sortedClauses.some((_, i) => clausePatterns[i] === undefined)}
                className="flex-1 bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform disabled:opacity-40"
              >
                <Ico size={18}>✓</Ico> こたえ合わせ
              </button>
            ) : (
              <button onClick={next} className="flex-1 bg-emerald-600 text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
                次の文へ <Ico size={18}>›</Ico>
              </button>
            ))}
        </div>

        <p className="text-[11px] text-[#1B2A4A]/40 mt-4 leading-relaxed">
          <Ico size={12}>📖</Ico>
          単語を長押しすると意味が出ます(この15問で使う単語は自前辞書に入っているので、通信がなくても表示されます)。
        </p>
      </div>

      {dict && (
        <div className="fixed inset-0 bg-black/30 flex items-end sm:items-center justify-center p-4 z-50" onClick={() => setDict(null)}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl" style={{ animation: "popIn 0.15s ease-out" }} onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-2">
              <h3 className="text-lg font-bold">{dict.word}</h3>
              <button onClick={() => setDict(null)} className="text-[#1B2A4A]/40">
                <Ico size={18}>✕</Ico>
              </button>
            </div>
            {dict.loading && <p className="text-sm text-[#1B2A4A]/50">調べています…</p>}
            {dict.error && <p className="text-sm text-[#1B2A4A]/50">見つかりませんでした。</p>}
            {dict.defs?.map((d, i) => (
              <div key={i} className="mb-2">
                {d.pos && <span className="text-[11px] uppercase tracking-wide text-[#1B2A4A]/40">{d.pos}</span>}
                <p className="text-sm">{d.def}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}



function Ico({ children, size = 16 }) {
  return <span style={{ fontSize: size, lineHeight: 1, display: "inline-block" }}>{children}</span>;
}

const PALETTE = ["#2F6FED", "#E8484F", "#2E9E6D", "#8B5CF6", "#0EA5A0"];

function HighlightedSentence({ text, mark, style }) {
  if (!mark) return <p className="font-mono text-lg leading-relaxed">{text}</p>;
  const idx = text.indexOf(mark);
  if (idx === -1) return <p className="font-mono text-lg leading-relaxed">{text}</p>;
  const before = text.slice(0, idx);
  const after = text.slice(idx + mark.length);
  const markClass = style === "bold" ? "font-extrabold text-[#1B2A4A]" : "underline decoration-2 decoration-[#2F6FED] underline-offset-4 font-bold text-[#1B2A4A]";
  return (
    <p className="font-mono text-lg leading-relaxed">
      {before}
      <span className={markClass}>{mark}</span>
      {after}
    </p>
  );
}

function StageCard({ stage, prog, onStart }) {
  const done = prog?.done;
  const pct = done ? Math.round((prog.correct / prog.total) * 100) : null;
  return (
    <button
      onClick={onStart}
      className="w-full text-left bg-white rounded-2xl border border-[#1B2A4A]/10 p-4 mb-2.5 shadow-sm active:scale-[0.99] transition-transform relative overflow-hidden"
    >
      <div className="flex items-center justify-between">
        <div>
          <div className="flex items-center gap-2 mb-0.5">
            <span className="font-bold text-base">{stage.title}</span>
            {done && (
              <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 rounded-full px-2 py-0.5">
                クリア
              </span>
            )}
          </div>
          <p className="text-xs text-[#1B2A4A]/50">{stage.subtitle}</p>
          <p className="text-[11px] text-[#1B2A4A]/35 mt-1">{stage.questions.length}問</p>
        </div>
        <div className="flex flex-col items-end gap-1">
          {done ? (
            <span className={`font-mono font-bold text-lg ${pct >= 80 ? "text-emerald-600" : pct >= 50 ? "text-amber-500" : "text-rose-500"}`}>
              {pct}%
            </span>
          ) : (
            <span className="text-xs text-[#1B2A4A]/30">未挑戦</span>
          )}
          <span className="text-[#1B2A4A]/30 text-lg">›</span>
        </div>
      </div>
    </button>
  );
}

function StageQuizApp({ onBack }) {
  const [screen, setScreen] = useState("map"); // "map" | "quiz" | "result"
  const [stageId, setStageId] = useState(null);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [checked, setChecked] = useState(false);
  const [runCorrect, setRunCorrect] = useState(0);
  const [progress, setProgress] = useState({});
  const [studentName, setStudentName] = useState("");

  const stage = STAGES.find((s) => s.id === stageId);
  const q = stage ? stage.questions[qIdx] : null;

  function startStage(id) {
    setStageId(id);
    setQIdx(0);
    setSelected(null);
    setChecked(false);
    setRunCorrect(0);
    setScreen("quiz");
  }

  function checkAnswer() {
    if (selected === null) return;
    setChecked(true);
    if (selected === q[1]) setRunCorrect((c) => c + 1);
  }

  function nextQ() {
    const isLast = qIdx === stage.questions.length - 1;
    if (isLast) {
      setProgress((prev) => ({ ...prev, [stageId]: { correct: runCorrect, total: stage.questions.length, done: true } }));
      setScreen("result");
    } else {
      setQIdx((i) => i + 1);
      setSelected(null);
      setChecked(false);
    }
  }

  function backToMap() {
    setScreen("map");
  }

  const clearedCount = Object.values(progress).filter((p) => p.done).length;
  const totalCorrect = Object.values(progress).reduce((a, p) => a + p.correct, 0);
  const totalAttempted = Object.values(progress).reduce((a, p) => a + p.total, 0);
  const overallAcc = totalAttempted ? Math.round((totalCorrect / totalAttempted) * 100) : 0;
  const stageCompletionPct = Math.round((clearedCount / STAGES.length) * 100);

  if (screen === "map") {
    return (
      <div className="min-h-screen bg-[#EDF1F5] text-[#1B2A4A] font-sans flex flex-col items-center py-6 px-3">
        <div className="w-full max-w-xl">
          <button onClick={onBack} className="text-[#1B2A4A]/50 text-sm mb-2 flex items-center gap-1">
            ← ホームに戻る
          </button>
          <h1 className="text-2xl font-bold tracking-tight mb-1">文型マスター ステージ選択</h1>
          <input
            type="text"
            value={studentName}
            onChange={(e) => setStudentName(e.target.value)}
            placeholder="名前(出席確認用)"
            className="w-full text-sm border border-[#1B2A4A]/15 rounded-lg px-3 py-1.5 bg-white mb-3"
          />

          <div className="bg-white rounded-2xl border border-[#1B2A4A]/10 p-4 mb-4 shadow-sm">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs text-[#1B2A4A]/50">全体の達成率</span>
              <span className="font-mono font-bold text-sm">{clearedCount} / {STAGES.length} ステージ</span>
            </div>
            <div className="w-full h-2.5 rounded-full bg-[#1B2A4A]/10 overflow-hidden mb-3">
              <div className="h-full rounded-full bg-[#1B2A4A] transition-all duration-500" style={{ width: `${stageCompletionPct}%` }} />
            </div>
            {totalAttempted > 0 && (
              <div className="flex items-center justify-between text-xs text-[#1B2A4A]/50">
                <span>これまでの正答率</span>
                <span className="font-mono font-bold text-[#1B2A4A]">{totalCorrect} / {totalAttempted} ({overallAcc}%)</span>
              </div>
            )}
          </div>

          {STAGES.map((s) => (
            <StageCard key={s.id} stage={s} prog={progress[s.id]} onStart={() => startStage(s.id)} />
          ))}
        </div>
      </div>
    );
  }

  if (screen === "result") {
    const prog = progress[stageId];
    const pct = Math.round((prog.correct / prog.total) * 100);
    const cheer = pct >= 90 ? "パーフェクトに近い!素晴らしい!" : pct >= 70 ? "よくできました!" : "もう一度復習してみよう";
    return (
      <div className="min-h-screen bg-[#EDF1F5] text-[#1B2A4A] font-sans flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl shadow-sm border border-[#1B2A4A]/10 p-6 max-w-sm w-full text-center">
          <p className="text-3xl mb-1">🎉</p>
          <h2 className="text-xl font-bold mb-1">{stage.title} クリア!</h2>
          <p className="text-xs text-[#1B2A4A]/50 mb-4">{stage.subtitle}</p>
          <p className="text-4xl font-mono font-bold mb-1">{prog.correct} / {prog.total}</p>
          <p className="text-sm text-[#1B2A4A]/60 mb-1">正答率 {pct}%</p>
          <p className="text-sm font-semibold text-violet-600 mb-5">{cheer}</p>
          <div className="flex flex-col gap-2">
            <button onClick={backToMap} className="bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold">
              ステージ一覧に戻る
            </button>
            <button onClick={() => startStage(stageId)} className="text-xs text-[#1B2A4A]/50 underline py-1">
              もう一度このステージに挑戦する
            </button>
          </div>
        </div>
      </div>
    );
  }

  // quiz screen
  return (
    <div className="min-h-screen bg-[#EDF1F5] text-[#1B2A4A] font-sans flex flex-col items-center py-6 px-3">
      <div className="w-full max-w-xl">
        <div className="flex items-center justify-between mb-3">
          <button onClick={backToMap} className="text-[#1B2A4A]/50 text-sm flex items-center gap-1">
            ← 一覧
          </button>
          <span className="text-xs tracking-wide text-[#1B2A4A]/50 font-mono">
            {stage.title} {qIdx + 1}/{stage.questions.length}
          </span>
        </div>

        <div className="w-full h-1.5 rounded-full bg-[#1B2A4A]/10 mb-4 overflow-hidden">
          <div className="h-full rounded-full bg-[#1B2A4A] transition-all duration-300" style={{ width: `${((qIdx + (checked ? 1 : 0)) / stage.questions.length) * 100}%` }} />
        </div>

        <div
          className="bg-white rounded-2xl shadow-sm border border-[#1B2A4A]/10 p-6 mb-4 relative overflow-hidden"
          style={{ backgroundImage: "repeating-linear-gradient(transparent, transparent 47px, rgba(27,42,74,0.08) 48px)" }}
        >
          <HighlightedSentence text={q[0]} mark={q[2]} style={stage.markStyle} />
        </div>

        <div className="flex flex-col gap-2 mb-4">
          {stage.options.map((opt, i) => {
            const isSel = selected === i;
            const isAnswer = checked && i === q[1];
            let cls = "bg-white border-[#1B2A4A]/15 text-[#1B2A4A]";
            if (isSel && !checked) cls = "bg-[#1B2A4A] border-[#1B2A4A] text-white shadow-md scale-[1.01]";
            if (checked) {
              if (isSel && isAnswer) cls = "bg-emerald-500 border-emerald-500 text-white";
              else if (isSel && !isAnswer) cls = "bg-rose-500 border-rose-500 text-white";
              else if (isAnswer) cls = "bg-emerald-50 border-emerald-500 text-emerald-700";
              else cls = "bg-white border-[#1B2A4A]/10 text-[#1B2A4A]/30";
            }
            return (
              <button
                key={i}
                disabled={checked}
                onClick={() => setSelected(i)}
                className={`flex items-center gap-2 rounded-xl px-4 py-3 border-2 text-left font-semibold text-sm transition-all ${cls}`}
              >
                {isSel && <Ico size={16}>✓</Ico>}
                {opt}
              </button>
            );
          })}
        </div>

        {!checked ? (
          <button
            onClick={checkAnswer}
            disabled={selected === null}
            className="w-full bg-[#1B2A4A] text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform disabled:opacity-40"
          >
            <Ico size={18}>✓</Ico> こたえ合わせ
          </button>
        ) : (
          <button onClick={nextQ} className="w-full bg-emerald-600 text-white rounded-xl py-3 font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
            {qIdx === stage.questions.length - 1 ? "結果を見る" : "次の問題へ"} <Ico size={18}>›</Ico>
          </button>
        )}
      </div>
    </div>
  );
}
